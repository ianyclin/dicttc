<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS 字卡系統 v5.0 (十層微型閘門版)</title>
    <style>
        :root { --primary: #4f46e5; --warning: #f59e0b; --success: #0ea5e9; --danger: #ef4444; --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 960px; margin: auto; line-height: 1.6; padding-bottom: 60px;}
        .header-stats { display: flex; flex-direction: column; gap: 15px; margin-bottom: 24px; padding: 20px; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        #dashboard { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-box { background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-num { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .gate-status { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; }
        .gate-bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 4px; overflow: hidden;}
        .gate-bar-fill { height: 100%; background: var(--success); }
        .gate-bar-fill.locked { background: var(--danger); }
        #deck { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 40px; }
        .card { background: var(--card-bg); width: 280px; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; gap: 15px; border-top: 6px solid var(--primary); }
        .card.review { border-top-color: var(--warning); }
        .card.new { border-top-color: var(--success); }
        .card.penalty { border-top-color: var(--danger); background: #fef2f2; }
        .char-title { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge.review { background: #fef3c7; color: #b45309; }
        .badge.new { background: #e0f2fe; color: #0369a1; }
        .eval-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .btn-eval { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; color: white;}
        .btn-eval-forget { background: var(--danger); }
        .btn-eval-hard { background: var(--warning); }
        .btn-eval-good { background: var(--primary); }
        .btn-eval-easy { background: var(--success); }
        .rpg-container { background: #e2e8f0; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .rpg-bar { background: linear-gradient(90deg, var(--warning), var(--danger)); height: 100%; width: 0%; transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div class="header-stats">
        <div class="flex-row">
            <h2>🧠 SRS 系統 v5.0 (動態負載版)</h2>
            <button class="btn btn-outline" onclick="toggleDashboard()">📊 資料管理與閘門狀態</button>
        </div>
        <div class="rpg-status">
            <strong>⚔️ 總學習經驗值 (畢業進度)</strong>
            <div class="rpg-container"><div class="rpg-bar" id="rpg-bar"></div></div>
            <div style="text-align: right; font-size: 0.8rem; color: var(--text-light);" id="rpg-text">0 / 0 畢業</div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-num" id="stat-total">0</div>總收錄字數</div>
            <div class="stat-box"><div class="stat-num" id="stat-learning">0</div>學習中</div>
            <div class="stat-box"><div class="stat-num" id="stat-grad">0</div>已畢業</div>
        </div>
        <div class="gate-status" id="gate-status-panel"></div>
        <div class="flex-row" style="margin-top: 20px;">
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn btn-primary" onclick="document.getElementById('import-file').click()">📂 匯入 JSON 字庫</button>
            <button class="btn btn-outline" onclick="exportData()">💾 備份匯出</button>
        </div>
    </div>

    <div id="deck"></div>

<script>
    let srsDatabase = JSON.parse(localStorage.getItem('srs_db_1')) || {};
    
    // 演算法全域常數
    const STAGE_INTERVALS = [0, 1, 3, 5, 7, 14, 21, 60, 180];
    const MAX_STAGE = STAGE_INTERVALS.length - 1;
    const GRADUATION_INTERVAL = 180;
    
    // 動態負載與解鎖閘門參數
    const MAX_DAILY_LOAD = 25;
    const ABSOLUTE_NEW_LIMIT = 10;
    const SAFETY_THRESHOLD = 0.85; 
    const LONG_TERM_STAGE = 6;
    const MAX_TIER = 10;

    // 午夜時間正規化
    function getMidnightTimestamp(ts) {
        let d = new Date(ts);
        d.setHours(0, 0, 0, 0);
        return d.getTime();
    }

    function saveData() { localStorage.setItem('srs_db_1', JSON.stringify(srsDatabase)); }

    function getNextStage(currentStage, q) {
        if (q === 0) return Math.max(0, currentStage - 2); 
        if (q === 1) return Math.max(1, currentStage - 1); 
        if (q === 2) return Math.min(MAX_STAGE, currentStage + 1); 
        if (q === 3) return Math.min(MAX_STAGE, currentStage + 2); 
        return currentStage;
    }

    function getTierMastery(tierLevel) {
        let total = 0, mastered = 0;
        for (let w in srsDatabase) {
            let r = srsDatabase[w];
            if (r.tier === tierLevel) {
                total++;
                if (r.stage >= LONG_TERM_STAGE) mastered++;
            }
        }
        return { total: total, mastered: mastered, rate: total === 0 ? 0 : (mastered / total) };
    }

    function getUnlockedTiers() {
        let unlocked = [1];
        for (let i = 1; i < MAX_TIER; i++) {
            let stats = getTierMastery(i);
            if (stats.total > 0 && stats.rate >= SAFETY_THRESHOLD) unlocked.push(i + 1);
            else break; 
        }
        return unlocked;
    }

    function toggleDashboard() {
        const db = document.getElementById('dashboard');
        db.classList.toggle('hidden');
        if (!db.classList.contains('hidden')) updateDashboard();
    }

    function updateDashboard() {
        let total = Object.keys(srsDatabase).length, grad = 0, learning = 0;
        for (let w in srsDatabase) { if (srsDatabase[w].stage >= MAX_STAGE) grad++; else learning++; }

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-learning').innerText = learning;
        document.getElementById('stat-grad').innerText = grad;

        let pct = total === 0 ? 0 : Math.round((grad / total) * 100);
        document.getElementById('rpg-bar').style.width = pct + '%';
        document.getElementById('rpg-text').innerText = `${grad} / ${total} 畢業 (${pct}%)`;

        let unlocked = getUnlockedTiers();
        let currentFocusTier = unlocked[unlocked.length - 1];
        let tStats = getTierMastery(currentFocusTier);
        
        let html = `<strong>🎯 當前攻略階層：Tier ${currentFocusTier}</strong><br>`;
        html += `<div style="font-size:0.9rem; margin-top:8px;">精熟度 (要求 ${SAFETY_THRESHOLD*100}% 解鎖下一層): ${Math.round(tStats.rate*100)}% (${tStats.mastered}/${tStats.total})</div>`;
        html += `<div class="gate-bar-bg"><div class="gate-bar-fill" style="width:${Math.min(100, tStats.rate*100)}%"></div></div>`;
        document.getElementById('gate-status-panel').innerHTML = html;
    }

    function createCardHTML(word, type) {
        let r = srsDatabase[word];
        let int1 = STAGE_INTERVALS[getNextStage(r.stage, 1)];
        let int2 = STAGE_INTERVALS[getNextStage(r.stage, 2)];
        let int3 = STAGE_INTERVALS[getNextStage(r.stage, 3)];
        
        let str1 = int1 >= GRADUATION_INTERVAL ? '畢業' : int1 + 'd';
        let str2 = int2 >= GRADUATION_INTERVAL ? '畢業' : int2 + 'd';
        let str3 = int3 >= GRADUATION_INTERVAL ? '畢業' : int3 + 'd';
        if (int1 === 0) str1 = '1m';
        
        return `
            <div class="card ${type}" id="card-${word}">
                <div style="display:flex; gap:10px;">
                    <div class="badge ${type}">${type==='review'?'待複習':(type==='penalty'?'重新記憶':'新解鎖')}</div>
                    <div class="badge" style="background:#f1f5f9; color:#64748b;">Tier ${r.tier}</div>
                </div>
                <div class="char-title">${word}</div>
                <div class="eval-buttons">
                    <button class="btn-eval btn-eval-forget" onclick="processReview('${word}', 0)">完全忘記</button>
                    <button class="btn-eval btn-eval-hard" onclick="processReview('${word}', 1)">困難 (${str1})</button>
                    <button class="btn-eval btn-eval-good" onclick="processReview('${word}', 2)">良好 (${str2})</button>
                    <button class="btn-eval btn-eval-easy" onclick="processReview('${word}', 3)">簡單 (${str3})</button>
                </div>
            </div>`;
    }

    function generateDailyDeck() {
        let nowMidnight = getMidnightTimestamp(Date.now());
        let deckDiv = document.getElementById('deck');
        deckDiv.innerHTML = '';
        
        let reviewQueue = [], newQueue = [];
        let unlockedTiers = getUnlockedTiers();

        for (let word in srsDatabase) {
            let data = srsDatabase[word];
            if (data.repetitions === 0) {
                if (unlockedTiers.includes(data.tier)) newQueue.push(word);
            } else if (nowMidnight >= getMidnightTimestamp(data.nextReview) && data.stage < MAX_STAGE) {
                reviewQueue.push(word);
            }
        }

        newQueue.sort((a, b) => srsDatabase[a].tier - srsDatabase[b].tier);

        // 動態負載計算
        let reviewCount = reviewQueue.length;
        let allowedNewCards = Math.max(0, MAX_DAILY_LOAD - reviewCount);
        allowedNewCards = Math.min(allowedNewCards, ABSOLUTE_NEW_LIMIT);

        reviewQueue.forEach(w => deckDiv.innerHTML += createCardHTML(w, 'review'));

        let addedNew = 0;
        for (let i = 0; i < newQueue.length; i++) {
            if (addedNew >= allowedNewCards) break;
            deckDiv.innerHTML += createCardHTML(newQueue[i], 'new');
            addedNew++;
        }

        if (deckDiv.innerHTML === '') {
            deckDiv.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--success); font-weight:bold; font-size: 1.2rem;">🎉 恭喜！今天的任務都完成了！</div>`;
        }
        updateDashboard();
    }

    function processReview(word, q) {
        let r = srsDatabase[word];
        let nextStage = getNextStage(r.stage, q);
        r.stage = nextStage;
        r.interval = STAGE_INTERVALS[nextStage];
        r.repetitions++;
        r.nextReview = q === 0 ? Date.now() : Date.now() + (r.interval * 24 * 60 * 60 * 1000);
        
        saveData();
        let card = document.getElementById(`card-${word}`);
        
        if (q === 0) {
            let deck = document.getElementById('deck');
            card.style.opacity = '0.3';
            setTimeout(() => {
                deck.appendChild(card);
                card.style.opacity = '1';
                card.outerHTML = createCardHTML(word, 'penalty'); 
            }, 300);
        } else { card.style.display = 'none'; }
        updateDashboard();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({db: srsDatabase})], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `srs_profile_1.json`; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                srsDatabase = data.db ? data.db : data;
                saveData();
                alert(`資料還原成功！`);
                location.reload();
            } catch (err) { alert('檔案格式錯誤。'); }
        };
        reader.readAsText(e.target.files[0]);
    }

    generateDailyDeck();
</script>
</body>
</html>
