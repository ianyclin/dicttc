<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學生 SRS 字卡系統 (雙軌加權版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 20px; max-width: 800px; margin: auto; line-height: 1.6; }

        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-info { background-color: #17a2b8; color: white; width: 100%; margin-top: 15px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; border-left: 5px solid #ccc; }
        .card.review { border-left-color: #e74c3c; } /* 複習卡片標示紅邊 */
        .card.new { border-left-color: #2ecc71; }    /* 新卡片標示綠邊 */
        .char-title { font-size: 48px; margin: 10px 0; }
        .dict-link { display: inline-block; margin-bottom: 15px; color: #0056b3; text-decoration: none; font-size: 18px; font-weight: bold; }
        .anki-controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .hidden { display: none; }
        .badge { font-size: 12px; padding: 3px 8px; border-radius: 12px; color: white; vertical-align: top; margin-left: 10px; }
        .badge.review { background: #e74c3c; }
        .badge.new { background: #2ecc71; }
        
        #dashboard { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 8px; margin-top: 20px; }
        #dashboard h3 { border-bottom: 1px solid #7f8c8d; padding-bottom: 10px; color: #f1c40f; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { background: #34495e; padding: 15px; border-radius: 6px; }
        .stat-box ul { padding-left: 20px; margin: 0; }
        
        @media (max-width: 600px) {
            .stat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>📚 字卡管理面板 (7:2:1 演算法)</h2>
        <button class="btn-primary" id="generateBtn">抽取今日字卡 (上限 10 字)</button>
        <button class="btn-warning" onclick="exportData()">匯出紀錄 (Backup)</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn-warning" onclick="document.getElementById('importFile').click()">匯入紀錄 (Restore)</button>
        <button class="btn-info" onclick="toggleDashboard()">切換數據儀表板 📊</button>
        <p id="drawStats" style="color: #555; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="stat-grid">
            <div class="stat-box">
                <h3>⚠️ 困難字庫 (需介入指導)</h3>
                <ul id="hardWordsList"></ul>
            </div>
            <div class="stat-box">
                <h3>🗓️ 待複習佇列 (未來排程)</h3>
                <ul id="upcomingWordsList"></ul>
            </div>
        </div>
    </div>

    <div id="deck"></div>

let srsDatabase = JSON.parse(localStorage.getItem('srs_db')) || {};
        
        // 提取未學習過的字
        function getUnlearnedWords(pool) {
            return pool.filter(word => !srsDatabase[word]);
        }

        // 2. 雙軌抽卡引擎
        document.getElementById('generateBtn').addEventListener('click', () => {
            document.getElementById('dashboard').classList.add('hidden');
            const now = Date.now();
            
            // [軌道一] 擷取今日必須複習的字
            let dueWords = [];
            for (const word in srsDatabase) {
                if (srsDatabase[word].nextReview <= now) {
                    dueWords.push(word);
                }
            }
            // 依據時間緊急度排序
            dueWords.sort((a, b) => srsDatabase[a].nextReview - srsDatabase[b].nextReview);
            
            let dailyDeck = dueWords.slice(0, 10).map(w => ({ word: w, type: 'review' }));
            let newQuota = 10 - dailyDeck.length;
            let newWordsStats = { t1: 0, t2: 0, t3: 0 };

            // [軌道二] 輪盤加權抽取新字 (70%, 20%, 10%)
            if (newQuota > 0) {
                let unlearnedT1 = getUnlearnedWords(TIER_1_1000);
                let unlearnedT2 = getUnlearnedWords(TIER_1001_2000);
                let unlearnedT3 = getUnlearnedWords(TIER_2000_PLUS);

for (let i = 0; i < newQuota; i++) {
                    // 修正：產生 1 到 100 的絕對整數
                    let rand = Math.floor(Math.random() * 100) + 1; 
                    let chosenWord = null;

                    if (rand <= 70 && unlearnedT1.length > 0) {
                        let idx = Math.floor(Math.random() * unlearnedT1.length);
                        chosenWord = unlearnedT1.splice(idx, 1)[0];
                        newWordsStats.t1++;
                    } else if (rand > 70 && rand <= 90 && unlearnedT2.length > 0) {
                        let idx = Math.floor(Math.random() * unlearnedT2.length);
                        chosenWord = unlearnedT2.splice(idx, 1)[0];
                        newWordsStats.t2++;
                    } else if (rand > 90 && unlearnedT3.length > 0) {
                        let idx = Math.floor(Math.random() * unlearnedT3.length);
                        chosenWord = unlearnedT3.splice(idx, 1)[0];
                        newWordsStats.t3++;
                    } else {
                        // Fallback: 若該層級已空，向下兼容抽取
                        if (unlearnedT1.length > 0) {
                            chosenWord = unlearnedT1.splice(Math.floor(Math.random() * unlearnedT1.length), 1)[0];
                            newWordsStats.t1++;
                        } else if (unlearnedT2.length > 0) {
                            chosenWord = unlearnedT2.splice(Math.floor(Math.random() * unlearnedT2.length), 1)[0];
                            newWordsStats.t2++;
                        } else if (unlearnedT3.length > 0) {
                            chosenWord = unlearnedT3.splice(Math.floor(Math.random() * unlearnedT3.length), 1)[0];
                            newWordsStats.t3++;
                        }
                    }

                    if (chosenWord) {
                        dailyDeck.push({ word: chosenWord, type: 'new' });
                    }
                }
            }

            if (dailyDeck.length === 0) {
                alert("太棒了！今日所有的任務都已清空，且字庫已全部學完！");
                return;
            }

            // 更新統計提示
            document.getElementById('drawStats').innerText = 
                `今日狀態：複習舊字 ${10 - newQuota} 個 ｜ 探索新字 ${newQuota} 個 (前千頻: ${newWordsStats.t1}, 中頻: ${newWordsStats.t2}, 挑戰: ${newWordsStats.t3})`;

            renderDeck(dailyDeck);
        });

        // 3. 渲染邏輯
        function renderDeck(deckArray) {
            const deck = document.getElementById('deck');
            deck.innerHTML = '';
            deckArray.forEach(item => {
                const word = item.word;
                const typeClass = item.type; // 'review' or 'new'
                const badgeText = typeClass === 'review' ? '待複習' : '新字';
                const moeduUrl = `https://www.moedict.tw/${encodeURIComponent(word)}`;
                
                const cardHtml = `
                    <div class="card ${typeClass}" id="card-${word}">
                        <div class="char-title">${word} <span class="badge ${typeClass}">${badgeText}</span></div>
                        <a class="dict-link" href="${moeduUrl}" target="_blank">📖 查詢萌典 (${word})</a>
                        <div class="anki-controls">
                            <button class="btn-danger" onclick="processReview('${word}', 0)">重來</button>
                            <button class="btn-warning" onclick="processReview('${word}', 1)">困難</button>
                            <button class="btn-success" onclick="processReview('${word}', 2)">良好</button>
                            <button class="btn-primary" onclick="processReview('${word}', 3)">簡單</button>
                        </div>
                    </div>
                `;
                deck.innerHTML += cardHtml;
            });
        }

        // 4. SM-2 演算法
        function processReview(word, quality) {
            let record = srsDatabase[word] || { interval: 0, repetitions: 0, easeFactor: 2.5 };
            
            if (quality === 0) {
                record.repetitions = 0;
                record.interval = 1;
            } else {
                record.repetitions += 1;
                if (record.repetitions === 1) record.interval = 1;
                else if (record.repetitions === 2) record.interval = 6;
                else record.interval = Math.round(record.interval * record.easeFactor);
            }
            
            record.easeFactor = record.easeFactor + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02));
            if (record.easeFactor < 1.3) record.easeFactor = 1.3;

            record.nextReview = Date.now() + (record.interval * 24 * 60 * 60 * 1000);
            
            srsDatabase[word] = record;
            localStorage.setItem('srs_db', JSON.stringify(srsDatabase));
            
            document.getElementById(`card-${word}`).classList.add('hidden');
        }

        // 儀表板與備份邏輯 (縮減顯示以保持程式碼簡潔，邏輯與前版相同)
        function toggleDashboard() {
            const dashboard = document.getElementById('dashboard');
            dashboard.classList.toggle('hidden');
            if (!dashboard.classList.contains('hidden')) renderStatistics();
        }

        function renderStatistics() {
            const hardList = document.getElementById('hardWordsList');
            const upcomingList = document.getElementById('upcomingWordsList');
            hardList.innerHTML = ''; upcomingList.innerHTML = '';
            
            const db = JSON.parse(localStorage.getItem('srs_db')) || {};
            let hardArr = [], upcomingArr = [];

            for (const [word, data] of Object.entries(db)) {
                if (data.easeFactor <= 2.1 && data.repetitions > 0) hardArr.push({ word, ef: data.easeFactor.toFixed(2) });
                if (data.nextReview) upcomingArr.push({ word, time: data.nextReview, interval: data.interval });
            }

            if (hardArr.length === 0) hardList.innerHTML = '<li>目前無困難字元。</li>';
            else hardArr.sort((a, b) => a.ef - b.ef).forEach(item => hardList.innerHTML += `<li><b>${item.word}</b> (系統難度係數: ${item.ef})</li>`);

            if (upcomingArr.length === 0) upcomingList.innerHTML = '<li>目前無排程中的字元。</li>';
            else upcomingArr.sort((a, b) => a.time - b.time).forEach(item => {
                const dateObj = new Date(item.time);
                const dateStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;
                upcomingList.innerHTML += `<li><b>${item.word}</b> -> 預計 ${dateStr} (間隔: ${item.interval}天)</li>`;
            });
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(srsDatabase));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "srs_backup.json");
            document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    srsDatabase = JSON.parse(e.target.result);
                    localStorage.setItem('srs_db', JSON.stringify(srsDatabase));
                    alert("紀錄匯入成功！");
                    if (!document.getElementById('dashboard').classList.contains('hidden')) renderStatistics();
                } catch (err) { alert("檔案格式錯誤。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
